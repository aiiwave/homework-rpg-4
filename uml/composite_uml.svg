<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: sans-serif; fill: #1a1a1a; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; fill: #444; }
</style>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5"/>
  </marker>
  <marker id="tri" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M1 1L9 5L1 9Z" fill="white" stroke="#555" stroke-width="1.2"/>
  </marker>
  <marker id="diamond" viewBox="0 0 14 10" refX="13" refY="5" markerWidth="10" markerHeight="8" orient="auto-start-reverse">
    <path d="M1 5L7 1L13 5L7 9Z" fill="white" stroke="#555" stroke-width="1.2"/>
  </marker>
</defs>
<text class="th" x="340" y="28" text-anchor="middle" font-size="15">Composite pattern — UML class diagram</text>
<!-- CombatNode interface -->
<rect fill="#E1F5EE" stroke="#0F6E56" x="220" y="50" width="240" height="110" rx="6" stroke-width="0.8"/>
<line x1="220" y1="76" x2="460" y2="76" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="340" y="67" text-anchor="middle">interface</text>
<text class="th" x="340" y="88" text-anchor="middle">CombatNode</text>
<line x1="220" y1="100" x2="460" y2="100" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="228" y="113">+ getName(): String</text>
<text class="ts" x="228" y="125">+ getHealth(): int   + getAttackPower(): int</text>
<text class="ts" x="228" y="137">+ takeDamage(int)   + isAlive(): boolean</text>
<text class="ts" x="228" y="149">+ getChildren(): List   + printTree(indent)</text>
<!-- UnitLeaf abstract -->
<rect fill="#EEEDFE" stroke="#534AB7" x="30" y="240" width="185" height="80" rx="6" stroke-width="0.8"/>
<line x1="30" y1="260" x2="215" y2="260" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="122" y="252" text-anchor="middle" font-style="italic">abstract</text>
<text class="th" x="122" y="272" text-anchor="middle">UnitLeaf</text>
<line x1="30" y1="284" x2="215" y2="284" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="38" y="297">- name: String</text>
<text class="ts" x="38" y="309">- health: int, attackPower: int</text>
<!-- HeroUnit -->
<rect fill="#EEEDFE" stroke="#534AB7" x="30" y="395" width="160" height="52" rx="6" stroke-width="0.8"/>
<line x1="30" y1="415" x2="190" y2="415" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="110" y="408" text-anchor="middle">HeroUnit</text>
<line x1="30" y1="429" x2="190" y2="429" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="38" y="441">extends UnitLeaf</text>
<!-- EnemyUnit -->
<rect fill="#FAECE7" stroke="#993C1D" x="210" y="395" width="160" height="52" rx="6" stroke-width="0.8"/>
<line x1="210" y1="415" x2="370" y2="415" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="290" y="408" text-anchor="middle">EnemyUnit</text>
<line x1="210" y1="429" x2="370" y2="429" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="218" y="441">extends UnitLeaf</text>
<!-- PartyComposite -->
<rect fill="#FAEEDA" stroke="#854F0B" x="430" y="240" width="225" height="120" rx="6" stroke-width="0.8"/>
<line x1="430" y1="260" x2="655" y2="260" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="542" y="253" text-anchor="middle">PartyComposite</text>
<line x1="430" y1="276" x2="655" y2="276" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="438" y="289">- children: List&lt;CombatNode&gt;</text>
<text class="ts" x="438" y="301">+ add(node: CombatNode)</text>
<text class="ts" x="438" y="313">+ getHealth(): int</text>
<text class="ts" x="438" y="325">+ takeDamage(int)</text>
<text class="ts" x="438" y="337">+ isAlive(): boolean</text>
<!-- RaidGroup -->
<rect fill="#FAEEDA" stroke="#854F0B" x="430" y="425" width="225" height="52" rx="6" stroke-width="0.8"/>
<line x1="430" y1="445" x2="655" y2="445" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="542" y="438" text-anchor="middle">RaidGroup</text>
<line x1="430" y1="461" x2="655" y2="461" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="438" y="473">extends PartyComposite</text>
<!-- RaidEngine -->
<rect fill="#F1EFE8" stroke="#5F5E5A" x="30" y="506" width="625" height="44" rx="6" stroke-width="0.8"/>
<line x1="30" y1="524" x2="655" y2="524" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="342" y="517" text-anchor="middle">RaidEngine</text>
<text class="ts" x="38" y="540">+ runRaid(teamA: CombatNode, teamB: CombatNode, skillA: Skill, skillB: Skill): RaidResult</text>
<!-- UnitLeaf implements CombatNode -->
<polyline points="122,240 122,162" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#tri)"/>
<!-- PartyComposite implements CombatNode -->
<polyline points="542,240 542,162" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#tri)"/>
<!-- HeroUnit extends UnitLeaf -->
<line x1="110" y1="395" x2="110" y2="322" stroke="#555" stroke-width="1" marker-end="url(#tri)"/>
<!-- EnemyUnit extends UnitLeaf -->
<polyline points="290,395 290,370 150,370 150,322" fill="none" stroke="#555" stroke-width="1" marker-end="url(#tri)"/>
<!-- RaidGroup extends PartyComposite -->
<line x1="542" y1="425" x2="542" y2="362" stroke="#555" stroke-width="1" marker-end="url(#tri)"/>
<!-- PartyComposite aggregates CombatNode 0..* -->
<path d="M430,295 Q390,295 390,155 Q390,105 462,105" fill="none" stroke="#555" stroke-width="1" marker-end="url(#diamond)"/>
<text class="ts" x="370" y="215" text-anchor="middle">0..*</text>
<!-- RaidEngine depends on CombatNode -->
<line x1="342" y1="506" x2="342" y2="162" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text class="ts" x="352" y="360" fill="#888">uses</text>
</svg>
